<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Famille+</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>
</head>

<body style="font-family: Arial; padding: 20px;">
  <h1>Famille+</h1>

  <input id="email" placeholder="Email"><br><br>
  <input id="password" placeholder="Mot de passe" type="password"><br><br>

  <button onclick="register()">Créer compte</button>
  <button onclick="login()">Connexion</button>

  <hr>

  <input id="message" placeholder="Message"><br><br>
  <button onclick="send()">Envoyer</button>

  <ul id="messages"></ul>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBhiLhzTpwfIJc7pNLuv1u5GpyLPtxKob4",
      authDomain: "familyplus-6d726.firebaseapp.com",
      projectId: "familyplus-6d726"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    function register() {
      auth.createUserWithEmailAndPassword(
        email.value,
        password.value
      );
    }

    function login() {
      auth.signInWithEmailAndPassword(
        email.value,
        password.value
      );
    }

    function send() {
      db.collection("messages").add({
        text: message.value
      });
    }

    db.collection("messages").onSnapshot(snapshot => {
      messages.innerHTML = "";
      snapshot.forEach(doc => {
        const li = document.createElement("li");
        li.innerText = doc.data().text;
        messages.appendChild(li);
      });
    });
  </script>
</body>
</html>
